# default configuration for OriginsEvolved

# transformation settings
dragon_transform_cooldown: 3600 # seconds
dragon_form_duration: 300 # seconds
transform_cooldown: 60 # generic transform cooldown in seconds

# ability cooldowns (seconds). you can set per-ability or use 'default'.
ability_cooldowns:
  default: 5
  arcane_analysis: 10
  arcane_shield: 25
  glide: 12
  swift_swim: 8
  mermaids_grace: 5
  veilwalk: 15
  potion_possession: 50
  charge_jump: 4
  mega_jump: 20
  lucky_eggs: 45
  pounce: 20
  dash: 4
  verdant_grasp: 50
  barkskin: 90
  ender_chest: 12
  levitation: 30
  howl: 180
  transform: 1200
  leap: 8
  breeze_ball: 15
  wind_launch: 12
  infectious_bite: 45
  tenacious: 180
  shriek: 20
  prospecting: 180
  rallying_cry: 180
  winged_ascension: 30
  chooser_of_the_slain: 120
  blood_surge: 120
  bat_form: 180
  dragon_breath: 60
  draconic_leap: 90
  horn_charge: 45
  burrow: 90
  hive_call: 45
  tunnel_dig: 60
  boost: 20
  thermal_surge: 20
  fire_resistance: 45

# evolution requirements (in seconds of playtime)
evolution_requirements:
  default: 0    # no requirement
  dragon: 3600  # example: must play one hour to evolve

# ability caster configuration - items that players can hold to activate abilities
ability_caster:
  primary:
    material: BLAZE_ROD
    name: '&bPrimary Ability Caster'
  secondary:
    material: STICK
    name: '&aSecondary Ability Caster'

# example bossbar settings (colors may be adjusted per origin/ability)
# bossbar:
#   default_color: WHITE

# general defaults
allow-origin-reset: true
