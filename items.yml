# Custom items

ability_orb:
  display_name: "&fAbility Orb"
  lore:
    - "Right-click: primary ability"
    - "Shift+right-click: secondary ability"
    - "Crouch+right-click: crouch ability"

ability_caster_primary:
  display_name: "&bPrimary Ability Caster"
  lore:
    - "Right-click with this item to cast your primary ability."

ability_caster_secondary:
  display_name: "&aSecondary Ability Caster"
